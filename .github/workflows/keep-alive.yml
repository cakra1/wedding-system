name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 8 */3 * *'  # Tiap 3 hari sekali, jam 8 pagi UTC (3 siang WIB)
  workflow_dispatch:        # Bisa trigger manual dari tab Actions

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase — keep project alive
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://cbohctaafmiudbqabjpt.supabase.co/rest/v1/tamu?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Response status: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
            echo "✅ Supabase aktif dan merespons."
          else
            echo "⚠️  Status tidak normal: $STATUS"
            exit 1
          fi
