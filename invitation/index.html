<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Wedding of Normandia & Sella</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&family=Great+Vibes&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Cover -->
  <div id="slot-cover"></div>

  <!-- Main content -->
  <div id="main">
    <div id="slot-hero"></div>
    <div id="slot-countdown"></div>
    <div id="slot-couple"></div>
    <div id="slot-quran"></div>
    <div id="slot-events"></div>
    <div id="slot-rsvp"></div>
    <div id="slot-wishes"></div>
    <div id="slot-egift"></div>
    <div id="slot-gallery"></div>
    <div id="slot-lightbox"></div>
    <div id="slot-closing"></div>
  </div>

  <!-- Audio Player -->
  <audio id="bgMusic" loop preload="none"></audio>

  <!-- Floating Music Button -->
  <button id="musicBtn" class="music-btn" onclick="toggleMusic()" title="Play / Pause Musik" style="display:none">
    <span class="music-disc">🎵</span>
  </button>

  <!-- Scripts: loader dulu, baru app -->
  <script type="module" src="js/loader.js"></script>
  <script type="module" src="js/app.js"></script>

</body>
</html>
