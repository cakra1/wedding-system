  <!-- Floating petals -->
  <div class="petal" style="left:8%;  animation-duration:14s; animation-delay:0s;   --drift:35px"></div>
  <div class="petal" style="left:18%; animation-duration:11s; animation-delay:2.5s; --drift:-28px"></div>
  <div class="petal" style="left:32%; animation-duration:16s; animation-delay:1.2s; --drift:50px"></div>
  <div class="petal" style="left:48%; animation-duration:12s; animation-delay:4s;   --drift:-40px"></div>
  <div class="petal" style="left:62%; animation-duration:15s; animation-delay:0.8s; --drift:22px"></div>
  <div class="petal" style="left:74%; animation-duration:10s; animation-delay:3.5s; --drift:-32px"></div>
  <div class="petal" style="left:86%; animation-duration:13s; animation-delay:1.8s; --drift:44px"></div>
  <div class="petal" style="left:92%; animation-duration:17s; animation-delay:6s;   --drift:-18px"></div>

  <!-- Main content -->
  <div class="cover-content">
    <div class="cover-dear">Kepada Yth.</div>
    <div class="cover-guest" id="coverGuest">Tamu Undangan</div>

    <div class="cover-ornament">
      <div class="cover-ornament-diamond"></div>
    </div>

    <div class="cover-invite">Kami mengundang Anda di acara pernikahan</div>

    <div class="cover-names">
      <span id="coverNamaPria"></span>
      <br>
      <span style="font-family:'Cormorant Garamond',serif;font-size:0.45em;color:rgba(201,169,110,0.8);font-style:italic;letter-spacing:0.12em">&amp;</span>
      <br>
      <span id="coverNamaWanita"></span>
    </div>

    <!-- Tanggal tunggal -->
    <div class="cover-date" id="coverTanggal"></div>

    <!-- Tanggal ganda (akad ≠ resepsi) -->
    <div id="coverTanggalGanda" style="display:none;text-align:center;margin-bottom:40px">
      <div style="font-family:'Cormorant Garamond',serif;font-size:0.58rem;letter-spacing:0.28em;color:rgba(255,255,255,0.35);text-transform:uppercase;margin-bottom:3px">Akad Nikah</div>
      <div class="cover-date" id="coverTanggalAkad" style="margin-bottom:12px"></div>
      <div style="width:20px;height:1px;background:rgba(201,169,110,0.4);margin:0 auto 12px"></div>
      <div style="font-family:'Cormorant Garamond',serif;font-size:0.58rem;letter-spacing:0.28em;color:rgba(255,255,255,0.35);text-transform:uppercase;margin-bottom:3px">Resepsi</div>
      <div class="cover-date" id="coverTanggalResepsi"></div>
    </div>

    <button class="open-btn" onclick="openInvitation()">Buka Undangan</button>
  </div>

</div>
