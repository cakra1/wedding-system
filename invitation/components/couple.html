      <circle cx="158" cy="27" r="1.6" fill="#C9A96E" opacity="0.32"/>

      <circle cx="322" cy="30" r="2.2" fill="#C9A96E" opacity="0.42"/>
      <circle cx="372" cy="28" r="1.6" fill="#C9A96E" opacity="0.36"/>
      <circle cx="422" cy="27" r="1.6" fill="#C9A96E" opacity="0.32"/>

      <circle cx="520" cy="28" r="1.4" fill="#C9A96E" opacity="0.24"/>

        <ellipse cx="0" cy="-8.5" rx="3"   ry="5.5" fill="#E8D5B0" opacity="0.55" transform="rotate(72)"/>

        <ellipse cx="0" cy="-8.5" rx="3"   ry="5.5" fill="#E8D5B0" opacity="0.55" transform="rotate(288)"/>

      <g transform="translate(100,27)" opacity="0.28">

        <ellipse cx="0" cy="-4.5" rx="1.8" ry="3" fill="#E8D5B0" transform="rotate(72)"/>
        <ellipse cx="0" cy="-4.5" rx="1.8" ry="3" fill="#E8D5B0" transform="rotate(144)"/>
        <ellipse cx="0" cy="-4.5" rx="1.8" ry="3" fill="#E8D5B0" transform="rotate(216)"/>

    </svg>
  </div>

  <!-- ===== Couple grid ===== -->
  <div class="couple-grid reveal">
    <div class="couple-card">
      <div class="couple-frame">
        <img id="fotoMempelaiPria" src="" alt="" style="width:100%;height:100%;object-fit:cover;display:none;border-radius:inherit">
        <span id="fotoMempelaiPriaEmoji" style="font-size:3rem">🤵</span>
      </div>
      <div class="couple-name" id="heroNamaPria"></div>
      <div class="couple-full" id="fullNamaPria"></div>
      <div class="couple-parents">
        Putra dari<br>
        <strong id="ortuPria"></strong>
      </div>
    </div>

    <div class="amp-big couple-sep">&amp;</div>

    <div class="couple-card">
      <div class="couple-frame">
        <img id="fotoMempelaiWanita" src="" alt="" style="width:100%;height:100%;object-fit:cover;display:none;border-radius:inherit">
        <span id="fotoMempelaiWanitaEmoji" style="font-size:3rem">👰</span>
      </div>
      <div class="couple-name" id="heroNamaWanita"></div>
      <div class="couple-full" id="fullNamaWanita"></div>
      <div class="couple-parents">
        Putri dari<br>
        <strong id="ortuWanita"></strong>
      </div>
    </div>
  </div>

</section>
