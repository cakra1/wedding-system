<!-- components/countdown.html -->
<section id="countdown-section">
  <div class="section-label">Menuju Hari Bahagia</div>
  <div class="section-title">Hitung Mundur</div>
  <div class="divider"><span>✦</span></div>

  <!-- Countdown Akad -->
  <div id="countdown-akad-wrap">
    <div class="countdown-event-label" id="countdown-akad-label"></div>
    <div class="countdown-grid">
      <div class="countdown-item">
        <div class="countdown-box">
          <span class="countdown-num" id="cDays">--</span>
          <div class="countdown-label">Hari</div>
        </div>
      </div>
      <div class="countdown-sep">:</div>
      <div class="countdown-item">
        <div class="countdown-box">
          <span class="countdown-num" id="cHours">--</span>
          <div class="countdown-label">Jam</div>
        </div>
      </div>
      <div class="countdown-sep">:</div>
      <div class="countdown-item">
        <div class="countdown-box">
          <span class="countdown-num" id="cMinutes">--</span>
          <div class="countdown-label">Menit</div>
        </div>
      </div>
      <div class="countdown-sep">:</div>
      <div class="countdown-item">
        <div class="countdown-box">
          <span class="countdown-num" id="cSeconds">--</span>
          <div class="countdown-label">Detik</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Countdown Resepsi (hanya muncul kalau tanggal beda) -->
  <div id="countdown-resepsi-wrap" style="display:none;margin-top:52px;padding-top:44px;border-top:1px solid rgba(255,255,255,0.06)">
    <div class="countdown-event-label" id="countdown-resepsi-label"></div>
    <div class="countdown-grid">
      <div class="countdown-item">
        <div class="countdown-box">
          <span class="countdown-num" id="cDays2">--</span>
          <div class="countdown-label">Hari</div>
        </div>
      </div>
      <div class="countdown-sep">:</div>
      <div class="countdown-item">
        <div class="countdown-box">
          <span class="countdown-num" id="cHours2">--</span>
          <div class="countdown-label">Jam</div>
        </div>
      </div>
      <div class="countdown-sep">:</div>
      <div class="countdown-item">
        <div class="countdown-box">
          <span class="countdown-num" id="cMinutes2">--</span>
          <div class="countdown-label">Menit</div>
        </div>
      </div>
      <div class="countdown-sep">:</div>
      <div class="countdown-item">
        <div class="countdown-box">
          <span class="countdown-num" id="cSeconds2">--</span>
          <div class="countdown-label">Detik</div>
        </div>
      </div>
    </div>
  </div>
</section>
